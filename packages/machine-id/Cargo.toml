[package]
name = "trishteam-machine-id"
version = "0.1.0"
edition = "2021"
authors = ["TrishTEAM <hosytri77@gmail.com>"]
description = "Stable device fingerprint cho TrishTEAM key concurrent control (Phase 36.5)"
license = "Proprietary"

[lib]
name = "trishteam_machine_id"
path = "src/lib.rs"

[dependencies]
sha2 = "0.10"
hostname = "0.4"
mac_address = "1.1"

[target.'cfg(windows)'.dependencies]
winreg = "0.52"

[target.'cfg(target_os = "linux")'.dependencies]
# /etc/machine-id read via std::fs
[target.'cfg(target_os = "macos")'.dependencies]
# IOPlatformUUID via system_profiler subprocess
